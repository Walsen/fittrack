name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Runs on every branch push and PR ──────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: echo '{}' > amplify_outputs.json
      - run: pnpm run lint
      - run: pnpm tsc --noEmit

  # ── Runs only on PR to main ───────────────────────────────────
  sbom:
    name: SBOM Generation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate CycloneDX SBOM
        run: |
          pnpm add -D @cyclonedx/cdxgen@10.11.0
          pnpm exec cdxgen -o sbom.json --format json --type js
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  sast:
    name: SAST (CodeQL)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  dependency-audit:
    name: Dependency Audit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod

  dast:
    name: DAST (ZAP Baseline)
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build & start app
        run: |
          echo '{}' > amplify_outputs.json
          pnpm run build
          pnpm run start &
          sleep 5
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          allow_issue_writing: false
