version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
        - pnpm exec ampx generate outputs --branch main --app-id $AWS_APP_ID
    build:
      commands:
        - export NODE_OPTIONS=--max-old-space-size=7168
        - export NEXT_PRIVATE_OUTPUT_TRACE_IGNORE="node_modules/@cyclonedx/**,node_modules/@appthreat/**"
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
